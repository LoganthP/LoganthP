  </text>

  <!-- LOWER LEFT -->
  <rect x="40"
        y="360"
        width="600"
        height="80"
        rx="16"
        fill="#020617"
        stroke="#1E293B"/>

  <!-- LOWER RIGHT -->
  <rect x="640"
        y="360"
        width="900"
        height="80"
        rx="16"
        fill="#ECECEC"/>

  <!-- Lower Divider -->
  <line x1="640"
        y1="360"
        x2="640"
        y2="440"
        stroke="#00F7FF"
        stroke-width="4"/>

  <!-- BUILD -->
  <text x="210"
        y="410"
        fill="#00F7FF"
        font-size="24"
        font-family="monospace"
        letter-spacing="7">
